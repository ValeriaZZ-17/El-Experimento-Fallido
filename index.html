<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Experimento Fallido</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
</head>
<body>
<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#000",
  physics: { default: "arcade", arcade: { debug: false } },
  scene: [MenuScene, GameScene, EndingScene]
};

let player, cursors, objetos, texto, battery = 100, alert = 0, presence, inventario = [];

class MenuScene extends Phaser.Scene {
  constructor() { super("MenuScene"); }
  preload() {
    this.load.image("poster", "tu_cartel_realista.jpg"); // Usa tu cartel aquí
    this.load.audio("ambiente", "ambiente.mp3"); // Sonido ambiental
  }
  create() {
    this.add.image(400, 300, "poster").setDisplaySize(800, 600);
    this.sound.add("ambiente", { loop: true, volume: 0.3 }).play();
    const boton = this.add.text(350, 500, "COMENZAR", { fontSize: "28px", fill: "#fff" })
      .setInteractive()
      .on("pointerdown", () => this.scene.start("GameScene"));
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super("GameScene"); }
  preload() {
    this.load.audio("pasos", "pasos.mp3");
    this.load.audio("presencia", "presencia.mp3");
    this.load.audio("objeto", "objeto.mp3");
  }
  create() {
    player = this.add.rectangle(100, 100, 30, 30, 0xffffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    objetos = this.physics.add.group();
    let cuaderno = this.add.rectangle(400, 300, 20, 20, 0x00ff00);
    objetos.add(cuaderno); cuaderno.nombre = "Cuaderno";

    texto = this.add.text(10, 10, "Linterna: 100% | Alerta: 0%", { fontSize: "16px", fill: "#fff" });
    cursors = this.input.keyboard.createCursorKeys();

    presence = this.add.rectangle(700, 500, 30, 30, 0xff0000);
    this.physics.add.existing(presence);
    presence.body.setCollideWorldBounds(true);

    this.physics.add.overlap(player, objetos, recogerObjeto, null, this);
    this.physics.add.overlap(player, presence, atrapado, null, this);

    this.time.addEvent({ delay: 2000, callback: moverPresencia, callbackScope: this, loop: true });
  }

  update() {
    player.body.setVelocity(0);
    if (cursors.left.isDown) { player.body.setVelocityX(-200); this.sound.play("pasos"); }
    if (cursors.right.isDown) { player.body.setVelocityX(200); this.sound.play("pasos"); }
    if (cursors.up.isDown) { player.body.setVelocityY(-200); this.sound.play("pasos"); }
    if (cursors.down.isDown) { player.body.setVelocityY(200); this.sound.play("pasos"); }

    if (cursors.space.isDown && battery > 0) {
      battery -= 0.1;
      alert += 0.2;
    }

    texto.setText("Linterna: " + Math.floor(battery) + "% | Alerta: " + Math.floor(alert) + "%");

    if (alert >= 100) {
      texto.setText("¡La presencia apareció!");
      presence.x = player.x + 50;
      presence.y = player.y + 50;
      if (!this.sound.get("presencia").isPlaying) this.sound.play("presencia");
    }
  }
}

class EndingScene extends Phaser.Scene {
  constructor() { super("EndingScene"); }
  create() {
    this.add.text(200, 300, "Final: La presencia te atrapó...", { fontSize: "24px", fill: "#fff" });
  }
}

function recogerObjeto(player, objeto) {
  inventario.push(objeto.nombre);
  texto.setText("Has recogido: " + objeto.nombre + " | Inventario: " + inventario.join(", "));
  objeto.destroy();
  player.scene.sound.play("objeto");
}

function atrapado() {
  player.destroy();
  texto.setText("La presencia te alcanzó...");
  setTimeout(() => { player.scene.start("EndingScene"); }, 2000);
}

function moverPresencia() {
  let dx = player.x - presence.x;
  let dy = player.y - presence.y;
  let dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 300) {
    presence.body.setVelocity(dx * 0.5, dy * 0.5);
  } else {
    presence.body.setVelocity(Phaser.Math.Between(-100,100), Phaser.Math.Between(-100,100
